name: CI

on:
  push:
    branches: ["main"]
  pull_request:
  workflow_dispatch:
    inputs:
      run_integration:
        description: "Run integration tests?"
        required: true
        default: "no"
        type: choice
        options:
          - yes
          - no
      run_e2e:
        description: "Run e2e tests?"
        required: true
        default: "no"
        type: choice
        options:
          - yes
          - no
jobs:
  tests:
    name: Run Python tests
    runs-on: ubuntu-latest
    env:
      AWS_DEFAULT_REGION: us-east-1

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install test dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pytest==9.0.2 boto3==1.42.72 moto==5.1.22 PyJWT==2.12.1

      # Always run unit tests
      - name: Run unit tests
        run: |
           PYTHONPATH=app pytest app/tests/unit -m "not integration and not e2e" -v
      # Run integration tests only if manual and input is yes
      - name: Run integration tests
        if: ${{ github.event_name == 'workflow_dispatch' && github.event.inputs.run_integration == 'yes' }}
        run: |
          PYTHONPATH=app pytest -m integration -v

      # Run e2e tests only if manual and input is yes
      - name: Run e2e tests
        if: ${{ github.event_name == 'workflow_dispatch' && github.event.inputs.run_e2e == 'yes' }}
        run: |
          PYTHONPATH=app pytest -m e2e -v

  terraform:
    name: Terraform validate and plan (${{ matrix.env }})
    runs-on: ubuntu-latest
    needs: tests

    strategy:
      matrix:
        env: [dev, prod]

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: 1.6.6

      - name: Terraform Init
        working-directory: infra/envs/${{ matrix.env }}
        run: terraform init -input=false -backend=false

      - name: Terraform Format
        working-directory: infra
        run: terraform fmt -check -recursive

      - name: Terraform Validate
        working-directory: infra/envs/${{ matrix.env }}
        run: terraform validate