name: CI

on:
  push:
    branches: ["main"]
  pull_request:
jobs:
  tests:
    name: Unit Tests
    runs-on: ubuntu-latest
    env:
      AWS_DEFAULT_REGION: us-east-1

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install test dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pytest==9.0.2 boto3==1.42.72 moto==5.1.22 PyJWT==2.12.1

      # Always run unit tests
      - name: Run unit tests
        run: |
           PYTHONPATH=app pytest app/tests/unit -m "not integration and not e2e" -v

  terraform:
    name: Terraform validate and plan (${{ matrix.env }})
    runs-on: ubuntu-latest
    needs: tests

    strategy:
      matrix:
        env: [dev, prod]

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: 1.6.6

      - name: Terraform Init
        working-directory: infra/envs/${{ matrix.env }}
        run: terraform init -input=false -backend=false

      - name: Terraform Format
        working-directory: infra
        run: terraform fmt -check -recursive

      - name: Terraform Validate
        working-directory: infra/envs/${{ matrix.env }}
        run: terraform validate