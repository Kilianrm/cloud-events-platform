name: CI Heavy / Integration & E2E

on:
  workflow_dispatch:
    inputs:
      run_integration:
        description: "Run integration tests?"
        required: true
        default: "no"
        type: choice
        options:
          - yes
          - no
      run_e2e:
        description: "Run e2e tests?"
        required: true
        default: "no"
        type: choice
        options:
          - yes
          - no

jobs:

  integration-and-e2e:
    name: Integration and E2E tests
    runs-on: ubuntu-latest
    env:
      AWS_DEFAULT_REGION: us-east-1

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install test dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pytest==9.0.2 boto3==1.42.72 moto==5.1.22 PyJWT==2.12.1

      - name: Run integration tests
        if: ${{ github.event.inputs.run_integration == 'true' }}
        run: |
          PYTHONPATH=app pytest app/tests/integration -v

      - name: Run e2e tests
        if: ${{ github.event.inputs.run_e2e == 'true' }}
        run: |
          PYTHONPATH=app pytest app/tests/e2e -v